# fly.toml app configuration file generated for unimatricula-backend on 2026-06-24T16:16:50-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'unimatricula-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ACCESS_TOKEN_EXPIRE_MINUTES = '120'
  ALGORITHM = 'HS256'
  PROJECT_NAME = 'Sistema de Gestion Academica Universitaria API'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
